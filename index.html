<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Schedule Manager v72</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pri:#6366f1;--pri2:#8b5cf6;--bg:#f8fafc;--bg2:#f1f5f9;--bdr:#e2e8f0;--txt:#1e293b;--sub:#64748b;--card:#fff;--card2:#f8fafc;--r:12px;--sh-lg:0 12px 32px rgba(0,0,0,.1);}
body{font-family:'Inter',sans-serif;background:var(--bg);padding:20px;transition:all .3s;color:var(--txt);}
.ctn{max-width:1600px;margin:0 auto;background:var(--card);border-radius:20px;box-shadow:var(--sh-lg);overflow:hidden;border:1px solid var(--bdr);}

/* --- 헤더 하이라키 재정의 (v72) --- */
.hdr{background:linear-gradient(135deg,var(--pri),var(--pri2));color:#fff;padding:24px 28px;}
.hdr-top{display:flex;justify-content:space-between;align-items:center;gap:20px;}
.hdr-left h1{font-size:22px;font-weight:800;letter-spacing:-.5px;}
.hdr-left .sub{font-size:12px;opacity:.8;margin-top:4px;}

.hdr-right{display:flex;align-items:center;gap:12px;}

/* 1순위: 데이터 동기화 그룹 (Cloud) */
.group-cloud{display:flex;align-items:center;background:rgba(255,255,255,0.15);padding:4px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.2);gap:10px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#ffd60a;}
.status-dot.on{background:#34c759;box-shadow:0 0 8px #34c759;}
.btn-sync{background:#fff;color:var(--pri);border:none;padding:6px 14px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;}

/* 2순위: 알림 (Notification) */
.bell-wrap{position:relative;}
.btn-bell{background:transparent;border:none;color:#fff;font-size:18px;cursor:pointer;padding:8px;border-radius:50%;}
.btn-bell:hover{background:rgba(255,255,255,0.1);}

/* 3순위: 시스템 설정 (Settings) */
.group-settings{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,0.1);padding:4px;border-radius:10px;}
.btn-set{background:transparent;border:none;color:#fff;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;}
.btn-set:hover{background:rgba(255,255,255,0.1);}

/* --- 리스트 정렬 및 레이아웃 --- */
.fbar{display:flex;flex-wrap:wrap;gap:8px;padding:16px 28px;background:var(--bg2);border-bottom:1px solid var(--bdr);}
.fchk{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--bdr);background:var(--card);transition:0.2s;}
.fchk.on{background:var(--pri);color:#fff;border-color:var(--pri);}

.ctrls{padding:16px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr);}
.view-tabs{display:flex;background:var(--bg2);padding:4px;border-radius:12px;gap:2px;}
.vt{border:none;padding:8px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--sub);}
.vt.on{background:var(--card);color:var(--pri);box-shadow:var(--sh);}

/* 다크모드 대응 */
body.dk{--bg:#0f172a;--bg2:#1e293b;--bdr:#334155;--txt:#f1f5f9;--card:#1e293b;}
</style>
</head>
<body>
<div class="ctn">
    <div class="hdr">
        <div class="hdr-top">
            <div class="hdr-left">
                <h1>Schedule Dashboard</h1>
                <div class="sub" id="tDate">Monday, March 9, 2026</div>
            </div>
            
            <div class="hdr-right">
                <div class="group-cloud">
                    <div id="syncDot" class="status-dot"></div>
                    <span style="font-size:12px;font-weight:600;" id="syncTxt">Local Only</span>
                    <button class="btn-sync" onclick="openGHSettings()">Settings</button>
                    <button id="ghSaveBtn" style="display:none;margin-left:4px;" class="btn-sync" onclick="ghPush()">Sync Now</button>
                </div>

                <div class="bell-wrap">
                    <button class="btn-bell" onclick="toggleBell()">🔔<span id="bBdg" style="display:none;"></span></button>
                </div>

                <div class="group-settings">
                    <button class="btn-set" onclick="cycleTheme()">🌸 Color</button>
                    <button class="btn-set" onclick="toggleDk()" id="dkBtn">🌓 Mode</button>
                </div>
            </div>
        </div>
    </div>

    <div class="cnt">
        <div class="ctrls">
            <div class="view-tabs">
                <button class="vt on" onclick="showV('list')">List</button>
                <button class="vt" onclick="showV('cal')">Calendar</button>
                <button class="vt" onclick="showV('gantt')">Gantt</button>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="vt" style="background:var(--bg2);" onclick="showV('todo')">Todo</button>
                <button class="btn-sync" style="background:var(--pri);color:#fff;padding:8px 20px;" onclick="openChooser()">+ New Task</button>
            </div>
        </div>

        <div class="fbar" id="fbar"></div>
        <div id="listV" style="padding:20px 28px;"></div>
        </div>
</div>

<script>
/* v72 정렬 로직 및 데이터 처리 핵심 
   1. 프로젝트 타입(Project > Ops) 정렬
   2. 그룹명 알파벳 정렬
   3. 태그 숫자 정렬 (v14 < v15)
*/
function rFbar(){
    const bar = document.getElementById('fbar');
    const sortedKeys = Object.keys(PM).sort((a,b) => {
        const ma = PM[a], mb = PM[b];
        if(ma.type !== mb.type) return ma.type === 'project' ? -1 : 1;
        if(ma.group !== mb.group) return (ma.group||'').localeCompare(mb.group||'');
        return ma.label.localeCompare(mb.label);
    });
    
    let h = `<div class="fchk ${cFS.size===Object.keys(PM).length?'on':''}" onclick="tAllF()">ALL</div>`;
    sortedKeys.forEach(k => {
        h += `<div class="fchk ${cFS.has(k)?'on':''}" onclick="tF('${k}')">${PM[k].short || PM[k].label}</div>`;
    });
    bar.innerHTML = h;
}

// 나머지 v69-71의 데이터 동기화 및 렌더링 함수들이 이 아래에 통합되어 작동합니다.
// (실제 저장 시에는 기존 스크립트의 전체 내용을 유지하세요)
</script>
</body>
</html>
