<!DOCTYPE html><html><head><meta charset="utf-8"><title>Setup</title><style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f0f0ff;}.box{text-align:center;padding:2rem;background:white;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);}h2{color:#6366f1;}</style></head><body><div class="box"><h2>Setting up...</h2><p id="m">GitHub Sync 설정 중...</p></div><script>var h=location.hash.slice(1),p=new URLSearchParams(h),t=p.get("t");if(t){try{localStorage.setItem("ghCfg",JSON.stringify({token:t,owner:"inkwangsong",repo:"my-plan",path:"index.html"}));document.getElementById("m").innerHTML="완료! 이동 중..."}catch(e){document.getElementById("m").innerHTML="Error: "+e.message}}setTimeout(function(){location.replace("/my-plan/")},1200);</script></body></html>
