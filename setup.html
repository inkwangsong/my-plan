<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Restoring...</title>
<style>
body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#6366f1;}
.box{text-align:center;padding:2rem 2.5rem;background:white;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.2);min-width:300px;}
h2{color:#6366f1;margin:12px 0 6px;}
.prog{width:100%;height:10px;background:#e2e8f0;border-radius:5px;overflow:hidden;margin:16px 0;}
.bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:5px;width:0;transition:width .4s;}
#msg{color:#64748b;font-size:14px;}
</style></head>
<body><div class="box">
<div style="font-size:48px">📋</div>
<h2>데이터 복구 중...</h2>
<div class="prog"><div class="bar" id="bar"></div></div>
<p id="msg">시작 중...</p>
</div>
<script>
var bar = document.getElementById('bar');
var msg = document.getElementById('msg');
function prog(pct, text) { bar.style.width = pct + '%'; msg.textContent = text; }

async function restore() {
  try {
    prog(10, 'GitHub에서 데이터 불러오는 중...');
    var r = await fetch('https://raw.githubusercontent.com/inkwangsong/my-plan/main/data.json?t=' + Date.now());
    if (!r.ok) throw new Error('fetch failed: ' + r.status);
    var data = await r.json();
    prog(50, 'localStorage에 저장 중...');
    if (data.pm)    localStorage.setItem('pm',    JSON.stringify(data.pm));
    if (data.evs)   localStorage.setItem('evs',   JSON.stringify(data.evs));
    if (data.po)    localStorage.setItem('po',    JSON.stringify(data.po));
    if (data.todos) localStorage.setItem('todos', JSON.stringify(data.todos));
    if (data.memos) localStorage.setItem('memos', JSON.stringify(data.memos));
    prog(80, 'GitHub Sync 설정...');
    var cfg = {};
    try { cfg = JSON.parse(localStorage.getItem('ghCfg') || '{}'); } catch(e) {}
    cfg.path = 'data.json';
    localStorage.setItem('ghCfg', JSON.stringify(cfg));
    prog(100, '완료!');
    msg.style.color = '#16a34a';
    msg.innerHTML = '<b>✅ todos ' + (data.todos ? data.todos.length : 0) + '건 복구 완료!</b><br>잠시 후 이동합니다...';
    setTimeout(function() { location.replace('/my-plan/'); }, 2000);
  } catch(e) {
    msg.style.color = '#ef4444';
    msg.textContent = '오류: ' + e.message;
    prog(0, '');
  }
}
restore();
</script></body></html>
