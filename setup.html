<!DOCTYPE html><html><head><meta charset="utf-8"><title>Syncing...</title><style>body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#6366f1;}.box{text-align:center;padding:2.5rem;background:#fff;border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,.2);min-width:320px;}h2{color:#6366f1;margin:12px 0 6px;}.prog{width:100%;height:10px;background:#e2e8f0;border-radius:5px;overflow:hidden;margin:18px 0;}.bar{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:5px;width:0;transition:width .4s;}#msg{color:#64748b;font-size:14px;}</style></head><body><div class="box"><div style="font-size:48px">📋</div><h2>동기화 중...</h2><div class="prog"><div class="bar" id="bar"></div></div><p id="msg">로딩중...</p></div><script>var b=document.getElementById("bar"),m=document.getElementById("msg");async function s(){try{b.style.width="30%";m.textContent="GitHub에서 최신 데이터 로딩...";var r=await fetch("https://raw.githubusercontent.com/inkwangsong/my-plan/main/data.json?_t="+Date.now());var d=await r.json();b.style.width="80%";m.textContent="저장 중...";["pm","evs","po","todos","memos"].forEach(k=>{if(d[k])localStorage.setItem(k,JSON.stringify(d[k]));});var c=JSON.parse(localStorage.getItem("ghCfg")||"{}");c.path="data.json";localStorage.setItem("ghCfg",JSON.stringify(c));b.style.width="100%";m.style.color="#16a34a";m.innerHTML="<b>✅ "+d.todos.length+"건 완료!</b> 이동 중...";setTimeout(()=>location.replace("/my-plan/"),1200);}catch(e){m.style.color="#ef4444";m.textContent="오류: "+e.message;}}s();</script></body></html>
